<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Tracker 2026 - Live</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        // Importamos los iconos que usa tu código
        const { 
            Map: MapIcon, Newspaper, BarChart3, History: HistoryIcon, Users, 
            ShieldAlert, Target, Anchor, MessageCircle, Send, Zap, AlertTriangle 
        } = lucide;

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('map');
            const lastUpdate = new Date().toLocaleTimeString();

            // Los datos exactos de tu app
            const warData = {
                stats: {
                    iran: { soldadosCaidos: 6180, barcosHundidos: 12, avionesPerdidos: 7 },
                    coalicion: { soldadosCaidos: 30, avionesPerdidos: 3, civilesBajas: 42, barcosDañados: 2 }
                },
                news: [
                    { id: 1, time: "Hace 2h", title: "Ultimátum de Trump", content: "EE.UU. confirma que el 6 de abril es la fecha límite para la desnuclearización total." },
                    { id: 2, time: "Hace 5h", title: "Ataque en Tabriz", content: "Bombardeo masivo a plantas petroquímicas." }
                ]
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans pb-20">
                    {/* Header Original */}
                    <div className="bg-slate-900 border-b border-red-900/30 p-4 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter italic">
                                    War <span className="text-red-600">Tracker</span> 2026
                                </h1>
                                <p className="text-[10px] text-slate-500 font-mono uppercase">Estado: Operación Furia Épica | DEFCON 2</p>
                            </div>
                            <div className="text-red-500 font-bold text-xs animate-pulse flex items-center gap-1">
                                <span className="block w-2 h-2 bg-red-600 rounded-full"></span> LIVE
                            </div>
                        </div>
                    </div>

                    <main className="max-w-4xl mx-auto p-4">
                        {activeTab === 'map' && (
                            <div className="space-y-4">
                                <div className="bg-slate-900 rounded-xl border border-slate-800 p-4 relative h-[400px] overflow-hidden flex items-center justify-center">
                                    <div className="absolute top-4 left-4 z-10 bg-black/60 p-2 rounded text-[10px] border border-slate-700">
                                        <p className="font-bold text-red-500">ZONAS ROJAS:</p>
                                        <p>• Teherán (Nuclear)</p>
                                        <p>• Tabriz (Refinerías)</p>
                                        <p>• Bandar Abbas (Puerto)</p>
                                    </div>
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Middle_East_map.svg/800px-Middle_East_map.svg.png" className="opacity-20 absolute w-full h-full object-cover" />
                                    <div className="relative text-red-600 font-black text-center">
                                        [ MAPA TÁCTICO ACTIVO ]
                                        <div className="w-20 h-20 border-2 border-red-600 rounded-full absolute -top-6 -left-6 animate-ping opacity-20"></div>
                                    </div>
                                </div>
                                <div className="bg-red-950/20 border border-red-900/50 p-4 rounded-xl flex items-start gap-3">
                                    <p className="text-xs text-red-200"><span className="font-bold">ALERTA:</span> El Estrecho de Ormuz permanece bajo bloqueo total.</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="grid grid-cols-1 gap-4">
                                <div className="bg-slate-900 p-6 rounded-2xl border border-red-900/30">
                                    <h3 className="text-red-500 font-bold mb-4 uppercase">Bajas de Irán</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                                            <p className="text-3xl font-black">{warData.stats.iran.soldadosCaidos.toLocaleString()}</p>
                                            <p className="text-[10px] text-slate-500 font-bold">SOLDADOS</p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                                            <p className="text-3xl font-black">{warData.stats.iran.barcosHundidos}</p>
                                            <p className="text-[10px] text-slate-500 font-bold">BARCOS</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav de tu App */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-2 flex justify-between max-w-4xl mx-auto">
                        {['map', 'intel', 'stats', 'chat', 'history', 'alliances'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`flex flex-col items-center flex-1 p-2 ${activeTab === t ? 'text-red-500' : 'text-slate-500'}`}>
                                <span className="text-[9px] font-bold uppercase">{t}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
