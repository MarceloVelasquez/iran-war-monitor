<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iran War Monitor - Chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px;">
    <h2>Monitor de Guerra - Chat en Vivo</h2>
    <div id="chat-box" style="height: 300px; border: 1px solid #444; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #000;"></div>
    <input type="text" id="user" placeholder="Tu nombre" style="padding: 5px;">
    <input type="text" id="msg" placeholder="Mensaje..." style="padding: 5px; width: 50%;">
    <button onclick="enviar()" style="padding: 5px; cursor: pointer;">Enviar</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6NnsnNSzVhu-w-8NLATu6w1f5rcVoQtY",
            authDomain: "iran-war-monitor.firebaseapp.com",
            projectId: "iran-war-monitor",
            storageBucket: "iran-war-monitor.firebasestorage.app",
            messagingSenderId: "910450759159",
            appId: "1:910450759159:web:ac93f92f28e79df945caf2",
            measurementId: "G-2837RHFCQB"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function enviar() {
            const user = document.getElementById('user').value;
            const msg = document.getElementById('msg').value;
            if(user && msg) {
                db.collection("mensajes").add({
                    usuario: user,
                    texto: msg,
                    fecha: new Date()
                });
                document.getElementById('msg').value = '';
            }
        }

        db.collection("mensajes").orderBy("fecha", "asc").onSnapshot((querySnapshot) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";
            querySnapshot.forEach((doc) => {
                chatBox.innerHTML += `<p><strong>${doc.data().usuario}:</strong> ${doc.data().texto}</p>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
