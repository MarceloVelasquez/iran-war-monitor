<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iran War Monitor - LIVE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050505; color: #ff3e3e; font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        .alert-bar { background: #600; color: white; padding: 10px; text-align: center; font-weight: bold; border: 2px solid red; margin-bottom: 15px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        .map-container { width: 100%; height: 250px; background: #111; border: 1px solid #333; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #444; }
        .news-feed { border-left: 3px solid #ff3e3e; padding-left: 15px; margin-bottom: 20px; }
        .news-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .timestamp { color: #888; font-size: 12px; }
        #chat-section { background: #111; padding: 15px; border-radius: 5px; border: 1px solid #222; }
        #chat-box { height: 200px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; color: #ddd; }
        input { background: #000; border: 1px solid #ff3e3e; color: white; padding: 10px; width: calc(100% - 22px); margin-bottom: 5px; }
        button { background: #ff3e3e; color: black; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="alert-bar">⚠️ ESTADO DE ALERTA: MONITOREO EN VIVO ⚠️</div>

    <div class="map-container">
        <p>[ MAPA TÁCTICO: MEDIO ORIENTE ]</p>
    </div>

    <div class="news-feed">
        <div class="news-item">
            <span class="timestamp">HACE 2 MIN</span>
            <p><strong>ALERTA:</strong> Movimientos detectados en la frontera norte.</p>
        </div>
        <div class="news-item">
            <span class="timestamp">HACE 15 MIN</span>
            <p><strong>REPORTE:</strong> Sistemas de defensa aérea activados en Teherán.</p>
        </div>
    </div>

    <div id="chat-section">
        <h4 style="margin-top:0">REPORTES DE USUARIOS (CHAT)</h4>
        <div id="chat-box"></div>
        <input type="text" id="user" placeholder="Tu indicativo (Nombre)">
        <input type="text" id="msg" placeholder="Reportar situación...">
        <button onclick="enviar()">ENVIAR REPORTE</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6NnsnNSzVhu-w-8NLATu6w1f5rcVoQtY",
            authDomain: "iran-war-monitor.firebaseapp.com",
            projectId: "iran-war-monitor",
            storageBucket: "iran-war-monitor.firebasestorage.app",
            messagingSenderId: "910450759159",
            appId: "1:910450759159:web:ac93f92f28e79df945caf2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function enviar() {
            const user = document.getElementById('user').value || "Soldado_Anonimo";
            const msg = document.getElementById('msg').value;
            if(msg) {
                db.collection("mensajes").add({
                    usuario: user,
                    texto: msg,
                    fecha: new Date()
                });
                document.getElementById('msg').value = '';
            }
        }

        db.collection("mensajes").orderBy("fecha", "asc").onSnapshot((querySnapshot) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";
            querySnapshot.forEach((doc) => {
                chatBox.innerHTML += `<p><strong>[${doc.data().usuario}]:</strong> ${doc.data().texto}</p>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
